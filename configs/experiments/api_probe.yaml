# Cheapest possible real-LLM run: reuses the MVP config (12 test instances)
# but only runs a single LLM decision system to verify the API path works.
# Total cost: a few cents.

run_name: mvp_smoke              # reuses the smoke run's panel + cards

data:
  dataset: synthetic
  series_count: 4
  series_length: 600
  input_length: 48
  forecast_horizon: 12

model_panel:
  architectures: [lstm, gru, transformer, tcn]
  regimes: [one_step_recursive, h_step_direct, direct_multi_step]
  hidden_size: 16
  num_layers: 1
  train_epochs: 2
  batch_size: 32

routers:
  models: [logistic_regression, random_forest, disagreement_threshold]

agents:
  provider: openai               # `--provider openai` on the CLI also works
  model: gpt-4o-mini
  temperature: 0.0
  debate_rounds: 1
  pricing_prompt_per_1k: 0.00015
  pricing_completion_per_1k: 0.0006
