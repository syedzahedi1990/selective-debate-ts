# Intermediate-scale config. Sized so all 6 LLM decision systems run on a
# real provider in <10 minutes and <$5. Use this as the first "real" config
# before the full paper.yaml.
#
# Compared to mvp.yaml:
#   - 8 synthetic series (was 4), length 1200 (was 600) -> ~72 test windows.
#   - 5 train epochs per model (was 2).
#   - Bigger hidden size + horizon, more representative of real benchmarks.

run_name: scaled
seed: 0

data:
  dataset: synthetic
  series_count: 8
  series_length: 1200
  input_length: 64
  forecast_horizon: 16

model_panel:
  architectures: [lstm, gru, transformer, tcn]
  regimes: [one_step_recursive, h_step_direct, direct_multi_step]
  hidden_size: 32
  num_layers: 2
  train_epochs: 5
  batch_size: 64

routers:
  models: [logistic_regression, random_forest, gradient_boosted, disagreement_threshold]

agents:
  provider: mock                  # override to openai/anthropic on the CLI
  debate_rounds: 1

evaluation:
  bootstrap_samples: 1000
